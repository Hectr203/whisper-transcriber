version: '3.9'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - PORT=3001
      - MAX_FILE_SIZE_MB=1024
      - FRONTEND_URL=http://localhost:5173
    volumes:
      - ./backend/src/uploads:/app/src/uploads
      - ./backend/src/temp:/app/src/temp
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  uploads:
  temp:
