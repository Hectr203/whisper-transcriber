name: CI - Control de Calidad (Proyecto Existente)

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "22"

jobs:
  quality-gate:
    name: Compuerta de Calidad
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - run: npm ci

      - name: Linter
        run: npm run lint 2>/dev/null || echo "Sin linter configurado"

      - name: TypeScript
        run: npm run typecheck 2>/dev/null || echo "Sin typecheck configurado"

  test:
    name: Pruebas
    needs: quality-gate
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - run: npm ci

      - name: Framework de pruebas detectado
        run: |
          if grep -q '"jest"' package.json; then
            echo "TEST_FRAMEWORK=jest" >> $GITHUB_ENV
          elif grep -q '"vitest"' package.json; then
            echo "TEST_FRAMEWORK=vitest" >> $GITHUB_ENV
          elif grep -q '"playwright"' package.json; then
            echo "TEST_FRAMEWORK=playwright" >> $GITHUB_ENV
          else
            echo "TEST_FRAMEWORK=none" >> $GITHUB_ENV
          fi

      - name: Instalar Playwright (si no existe)
        if: env.TEST_FRAMEWORK != 'playwright'
        run: |
          npm install -D @playwright/test
          npx playwright install --with-deps chromium

      - name: Pruebas existentes
        run: npm test 2>/dev/null || echo "Sin suite de pruebas configurada"

      - name: Pruebas E2E (Playwright)
        run: npx playwright test --project=chromium 2>/dev/null || echo "Sin tests E2E configurados"

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/

  build:
    name: Build
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - run: npm ci

      - name: Build
        run: npm run build 2>/dev/null || echo "Sin build configurado"

      - uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            dist/
            build/

  security-audit:
    name: Auditoria de Seguridad
    needs: quality-gate
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - run: npm ci

      - name: Auditoria npm
        run: npm audit --audit-level=high 2>/dev/null || echo "Sin npm audit disponible"

      - name: Escanear secretos
        uses: trufflesecurity/trufflehog@v3
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
