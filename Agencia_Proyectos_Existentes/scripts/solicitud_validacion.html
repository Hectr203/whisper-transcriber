<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>⚠️ Necesito Validación</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #4c1d95, #be185d, #e11d48);
      color: white;
    }
    main {
      width: min(880px, calc(100vw - 32px));
      padding: 42px;
      border-radius: 28px;
      background: rgba(15, 23, 42, 0.85);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.4);
      text-align: center;
    }
    .alerta {
      display: inline-block;
      margin-bottom: 18px;
      padding: 10px 16px;
      border-radius: 999px;
      background: #f43f5e;
      color: white;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    h1 { font-size: clamp(32px, 6vw, 72px); margin: 0 0 18px; }
    .preguntas { 
        font-size: clamp(18px, 3vw, 24px); 
        line-height: 1.5; 
        margin: 20px 0; 
        text-align: left;
        background: rgba(0,0,0,0.3);
        padding: 24px;
        border-radius: 16px;
        border-left: 4px solid #f43f5e;
    }
    .instruccion {
        font-size: 18px;
        color: #fca5a5;
        margin-top: 20px;
        font-weight: bold;
    }
    .hora { margin-top: 26px; color: #cbd5e1; font-size: 16px; }
  </style>
</head>
<body>
  <main>
    <div class="alerta">Acción Requerida</div>
    <h1>Necesito Validación</h1>

    <div class="preguntas">
        Hola de nuevo. ¿Se escucha correctamente el nuevo audio &#x27;Necesito Validación.mp3&#x27;?
    </div>

    <p class="instruccion">El agente está en espera. Por favor, proporciona tus respuestas en el chat para continuar.</p>
    <div class="hora" id="hora"></div>
  </main>
  <script>
    // Reproducir el sonido con JavaScript como fallback, por si el de sistema falla (mismo que en notificar_tarea)
    document.getElementById('hora').textContent = new Date().toLocaleString('es-MX');
    function beep() {
      const contexto = new (window.AudioContext || window.webkitAudioContext)();
      for (let i = 0; i < 2; i++) {
        const oscilador = contexto.createOscillator();
        const ganancia = contexto.createGain();
        oscilador.type = 'square';
        oscilador.frequency.value = 880 + (i * 120);
        ganancia.gain.setValueAtTime(0.0001, contexto.currentTime + i * 0.45);
        ganancia.gain.exponentialRampToValueAtTime(0.35, contexto.currentTime + i * 0.45 + 0.02);
        ganancia.gain.exponentialRampToValueAtTime(0.0001, contexto.currentTime + i * 0.45 + 0.32);
        oscilador.connect(ganancia);
        ganancia.connect(contexto.destination);
        oscilador.start(contexto.currentTime + i * 0.45);
        oscilador.stop(contexto.currentTime + i * 0.45 + 0.34);
      }
    }
    beep();
  </script>
</body>
</html>
